name: Auto Clean NBSP

# 파이썬 파일이 수정되어 Push(Commit)될 때마다 로봇이 작동합니다.
on:
  push:
    paths:
      - '**.py'
      - '*.py'
      - 'fishing'

jobs:
  clean-ghost-spaces:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 파일을 수정하고 저장할 수 있는 권한

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 유령 공백(\xa0) 자동 치환 스크립트 실행
        run: |
          python -c "
          import os, glob
          
          # 1. py 확장자 파일들을 모두 찾습니다.
          target_files = glob.glob('**/*.py', recursive=True)
          
          # 2. 'fishing' 이라는 파일이 존재하면 검사 대상에 강제로 끼워 넣습니다.
          if os.path.exists('fishing'):
              target_files.append('fishing')
              
          # 3. 확보된 모든 파일을 돌며 유령 공백을 청소합니다.
          for f in target_files:
              with open(f, 'r', encoding='utf-8') as file:
                  content = file.read()
              if '\xa0' in content:
                  with open(f, 'w', encoding='utf-8') as file:
                      file.write(content.replace('\xa0', ' '))
                  print(f'🧹 [청소 완료] {f} 파일의 유령 공백을 제거했습니다.')
          "

      - name: 변경된 코드를 자동으로 Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 변경사항이 있을 때만 'chore: Auto-remove ghost spaces (NBSP)'라는 이름으로 자동 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-remove ghost spaces (NBSP)" && git push)
